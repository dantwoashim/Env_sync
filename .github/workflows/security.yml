name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Dependency audit
        run: |
          go list -m all > /tmp/deps.txt
          echo "Dependencies:"
          cat /tmp/deps.txt

      - name: Check for known vulnerable patterns
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn 'password\s*=' --include='*.go' . | grep -v '_test.go' | grep -v 'func\|type\|//\|var\|const' || true
          echo "Done."
